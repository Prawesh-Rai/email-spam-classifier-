<!DOCTYPE html>
<html>
<head>
    <title>Email Spam Classifier</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            text-align:center;
            margin-top:50px;
        }
        textarea{
            width:60%;
            height:150px;
            padding:10px;
            font-size:16px;
        }
        button{
            margin-top:15px;
            padding:10px 20px;
            font-size:18px;
        }
        h2{
            color:blue;
        }
    </style>
</head>
<body>

<h1>Email Spam Classifier</h1>

<form method="POST">
    <textarea name="email" placeholder="Enter email text here..." required></textarea>
    <br><br>
    <button type="submit">Predict</button>
</form>

{% if prediction %}
<h2>Prediction: {{ prediction }}</h2>
{% endif %}

</body>
</html>
